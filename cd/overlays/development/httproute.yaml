apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otterscan
  labels:
    app.kubernetes.io/name: otterscan
spec:
  parentRefs:
    - name: gke-gateway
      namespace: gke-gateway-stg
      sectionName: https
  hostnames:
    - otterscan.zilstg.dev
  rules:
    - backendRefs:
        - name: otterscan
          port: 80
